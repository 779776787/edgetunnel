name: Update CF Optimized IPs

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch optimized IPs
        run: python scripts/fetch_cfip.py
        env:
          PORTS: "443,2053,8443"
          MAX_PER_COLO: "3"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/cfip.txt
          git diff --cached --quiet || git commit -m "更新优选IP $(date -u +%Y-%m-%d_%H:%M)"
          git push
